[general]
framerate = 30
bars = 24
bar_width = 2
bar_spacing = 1
autosens = 1
sensitivity = 95
lower_cutoff_freq = 60
higher_cutoff_freq = 12000
sleep_timer = 1

[input]
method = pipewire
source = auto

[output]
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 7
bar_delimiter = 59
frame_delimiter = 10
channels = mono
mono_option = average

[smoothing]
noise_reduction = 65
monstercat = 1
waves = 0
gravity = 70

[color]
background = default
foreground = default
gradient = 1
gradient_color_1 = '#{{ colors.primary_container.default.hex_stripped }}'
gradient_color_2 = '#{{ colors.primary.default.hex_stripped }}'
gradient_color_3 = '#{{ colors.tertiary.default.hex_stripped }}'
gradient_color_4 = '#{{ colors.secondary.default.hex_stripped }}'
gradient_color_5 = '#{{ colors.on_primary_container.default.hex_stripped }}'
gradient_color_6 = '#{{ colors.primary.default.hex_stripped }}'

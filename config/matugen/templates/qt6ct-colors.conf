[ColorScheme]
author=Matugen
name=matugen

# Simple named keys
window=#{{ colors.surface.default.hex }}
windowText=#{{ colors.on_surface.default.hex }}
base=#{{ colors.surface.default.hex }}
text=#{{ colors.on_surface.default.hex }}
tooltipBase=#{{ colors.surface_container_high.default.hex }}
tooltipText=#{{ colors.on_surface.default.hex }}
button=#{{ colors.surface_container.default.hex }}
buttonText=#{{ colors.on_surface.default.hex }}
brightText=#{{ colors.primary.default.hex }}
highlight=#{{ colors.primary_container.default.hex }}
highlightedText=#{{ colors.on_primary_container.default.hex }}
link=#{{ colors.primary.default.hex }}
linkVisited=#{{ colors.secondary.default.hex }}
alternateBase=#{{ colors.surface_container_high.default.hex }}

# Full 21-color palette — Active / Disabled / Inactive
# WindowText, Button, Light, Midlight, Dark, Mid,
# Text, BrightText, ButtonText, Base, Window, Shadow,
# Highlight, HighlightedText, Link, LinkVisited,
# AlternateBase, (unused), ToolTipBase, ToolTipText, PlaceholderText

active_colors=#ff{{ colors.on_surface.default.hex_stripped }}, #ff{{ colors.surface_container.default.hex_stripped }}, #ff{{ colors.surface_container_highest.default.hex_stripped }}, #ff{{ colors.surface_container_high.default.hex_stripped }}, #ff{{ colors.background.default.hex_stripped }}, #ff{{ colors.surface.default.hex_stripped }}, #ff{{ colors.on_surface.default.hex_stripped }}, #ff{{ colors.primary.default.hex_stripped }}, #ff{{ colors.on_surface.default.hex_stripped }}, #ff{{ colors.surface.default.hex_stripped }}, #ff{{ colors.surface.default.hex_stripped }}, #ff000000, #ff{{ colors.primary_container.default.hex_stripped }}, #ff{{ colors.on_primary_container.default.hex_stripped }}, #ff{{ colors.primary.default.hex_stripped }}, #ff{{ colors.secondary.default.hex_stripped }}, #ff{{ colors.surface_container_high.default.hex_stripped }}, #ff{{ colors.on_surface.default.hex_stripped }}, #ff{{ colors.surface_container_high.default.hex_stripped }}, #ff{{ colors.on_surface.default.hex_stripped }}, 80{{ colors.on_surface_variant.default.hex_stripped }}

disabled_colors=#ff{{ colors.on_surface_variant.default.hex_stripped }}, #ff{{ colors.surface_container.default.hex_stripped }}, #ff{{ colors.surface_container_highest.default.hex_stripped }}, #ff{{ colors.surface_container_high.default.hex_stripped }}, #ff{{ colors.background.default.hex_stripped }}, #ff{{ colors.surface.default.hex_stripped }}, #ff{{ colors.on_surface_variant.default.hex_stripped }}, #ff{{ colors.primary.default.hex_stripped }}, #ff{{ colors.on_surface_variant.default.hex_stripped }}, #ff{{ colors.surface.default.hex_stripped }}, #ff{{ colors.surface.default.hex_stripped }}, #ff000000, #ff{{ colors.primary_container.default.hex_stripped }}, #ff{{ colors.on_surface_variant.default.hex_stripped }}, #ff{{ colors.primary.default.hex_stripped }}, #ff{{ colors.secondary.default.hex_stripped }}, #ff{{ colors.surface_container_high.default.hex_stripped }}, #ff{{ colors.on_surface.default.hex_stripped }}, #ff{{ colors.surface_container_high.default.hex_stripped }}, #ff{{ colors.on_surface.default.hex_stripped }}, 80{{ colors.on_surface_variant.default.hex_stripped }}

inactive_colors=#ff{{ colors.on_surface.default.hex_stripped }}, #ff{{ colors.surface_container.default.hex_stripped }}, #ff{{ colors.surface_container_highest.default.hex_stripped }}, #ff{{ colors.surface_container_high.default.hex_stripped }}, #ff{{ colors.background.default.hex_stripped }}, #ff{{ colors.surface.default.hex_stripped }}, #ff{{ colors.on_surface.default.hex_stripped }}, #ff{{ colors.primary.default.hex_stripped }}, #ff{{ colors.on_surface.default.hex_stripped }}, #ff{{ colors.surface.default.hex_stripped }}, #ff{{ colors.surface.default.hex_stripped }}, #ff000000, #ff{{ colors.primary_container.default.hex_stripped }}, #ff{{ colors.on_primary_container.default.hex_stripped }}, #ff{{ colors.primary.default.hex_stripped }}, #ff{{ colors.secondary.default.hex_stripped }}, #ff{{ colors.surface_container_high.default.hex_stripped }}, #ff{{ colors.on_surface.default.hex_stripped }}, #ff{{ colors.surface_container_high.default.hex_stripped }}, #ff{{ colors.on_surface.default.hex_stripped }}, 80{{ colors.on_surface_variant.default.hex_stripped }}

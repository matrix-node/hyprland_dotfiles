# Hyprlock — matugen-themed lock screen
# Colors from hyprlock-colors.conf (generated by matugen)

source = ~/.config/hypr/hyprlock-colors.conf

$font = JetBrainsMono Nerd Font

general {
    hide_cursor = false
    ignore_empty_input = false
}

# uncomment to enable fingerprint authentication
# auth {
#     fingerprint {
#         enabled = true
#         ready_message = Scan fingerprint to unlock
#         present_message = Scanning...
#         retry_delay = 250
#     }
# }

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    color = $background
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = $frost_panel
    outer_color = $primary
    check_color = $secondary
    fail_color = $error
    font_color = $on_surface
    fade_on_empty = false
    rounding = 15
    font_family = $font
    placeholder_text = Password…
    fail_text = $PAMFAIL
    dots_spacing = 0.3
    position = 0, 70
    halign = center
    valign = bottom
}

# TIME
label {
    monitor =
    text = $TIME
    color = $on_surface
    font_size = 90
    font_family = $font
    position = 0, 270
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    color = $on_surface_variant
    font_size = 25
    font_family = $font
    position = 0, 100
    halign = center
    valign = center
}

# Profile
image {
    monitor =
    path = ~/.face
    size = 150
    rounding = -1
    border_size = 3
    border_color = $primary
    position = 0, -170
    halign = center
    valign = center
}

# Layout indicator (us,ru — toggled with Alt+Shift in input.lua)
label {
    monitor =
    text =   $LAYOUT[en,ru]
    color = $on_surface
    font_size = 20
    font_family = $font
    onclick = hyprctl switchxkblayout all next
    position = 0, 78
    halign = center
    valign = bottom
}
